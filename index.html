<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resizer Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        display: flex;
      }

      .container {
        display: flex;
        flex: 1;
      }

      .panel {
        flex: 1;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="container" class="container">
      <div class="panel" id="panel_one">Panel 1</div>
      <div class="panel">Panel 2</div>
    </div>

    <script type="module">
      import { Resizer } from "./dist/resizer.js";

      const resizer = new Resizer(
        {
          container: document.getElementById("container"),
          direction: "horizontal",
          handleStyles: {
            width: "8px",
            background: "#2a2a2a",
            cursor: "col-resize",
            transition: "background 0.2s ease",
            position: "relative",
            zIndex: "10",
          },
          minFlex: 0.3,
          storageKey: "storage_key",
        },
        {
          onBeginDrag: () => {
            console.log("[onBeginDrag] ran");
          },
          onChildCountChange: (count) => {
            console.log(`[onChildCountChange] ran count ${count}`);
          },
          onDrag: (values) => {
            // console.log(`[onDrag] ran values ${values}`);
          },
          onDragFinished: (values) => {
            console.log(`[onDragFinished] ran values ${values}`);
          },
          onDragPastMin: (side, pixels) => {
            console.log(`[onDragPastMin] ran side ${side} pixels ${pixels}`);
          },
        },
      );

      setTimeout(() => {
        console.warn("Removeing panel one");
        document.getElementById("panel_one").remove();
        resizer.refresh()
      }, 10000);
    </script>
  </body>
</html>
